services:
  - type: web
    name: sap-btp-companion
    runtime: node
    plan: free

    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: sap-btp-companion-db
          property: connectionString

databases:
  - name: sap-btp-companion-db
    plan: free
    databaseName: sapbtp
    user: sapbtp
